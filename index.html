<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIU Class Schedule Finder</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
                <div class="logo-container">
                    <img src="logo.png" alt="DIU CPC Logo" class="main-logo">
                    <h1>DIU Class Schedule Finder</h1>
                    <p class="subtitle">Quick Routine Finder for Dhaka International University</p>
                </div>
        </header>

        <main>
            <div class="filter-panel">
                <div class="search-section">
                    <input type="text" id="search-input" placeholder="Search Teacher, Course (e.g. AI)..." autofocus>
                </div>
                <div class="dropdown-section">
                    <select id="day-filter">
                        <option value="">All Days</option>
                        <option value="Saturday">Saturday</option>
                        <option value="Sunday">Sunday</option>
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                    <select id="room-filter">
                        <option value="">All Rooms/Labs</option>
                    </select>
                    <div class="view-toggle">
                        <button id="view-batch" class="active">Batch View</button>
                        <button id="view-slots">Finder View</button>
                    </div>
                </div>
            </div>

            <div id="dashboard" class="dashboard-grid">
                <div class="no-results">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <p>Fetching the latest routines...</p>
                </div>
            </div>
        </main>

        <footer style="text-align: center; margin-top: 50px; padding: 20px; color: var(--text-muted); font-size: 0.9rem; border-top: 1px solid rgba(0,0,0,0.05);">
            <p>&copy; 2026 DIU Computer Programming Club (CPC) | Let Infinity Be Your Limit</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
